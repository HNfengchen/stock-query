# 数据库配置
database:
  host: localhost
  port: 5432
  user: ${DB_USER:postgres}
  password: ${DB_PASSWORD:}
  database: stock_data
  pool_size: 5

# 数据获取配置
data_fetcher:
  max_retries: 2
  retry_delay: 1
  request_timeout: 15

# xtquant 配置
xtquant:
  enabled: true
  max_retries: 3
  retry_delay: 1
  data_dir: ""

# 技术指标参数
technical_indicators:
  macd:
    fast: 12
    slow: 26
    signal: 9
  rsi:
    periods: [6, 12, 24]
  kdj:
    n: 9
    m1: 3
    m2: 3
  ma:
    periods: [5, 10, 20, 60]
  boll:
    n: 20
    k: 2

# 分析参数
analyzer:
  weights:
    technical: 0.5
    fund_flow: 0.3
    sentiment: 0.2
  thresholds:
    strong_buy: 0.7
    buy: 0.5
    hold: 0.3
  trend_thresholds:
    strong_threshold: 0.03
    normal_threshold: 0.01
  validation:
    score_thresholds:
      technical_bullish: 0.65
      technical_bearish: 0.35
      fund_bullish: 0.6
      fund_bearish: 0.4
      sentiment_bullish: 0.6
      sentiment_bearish: 0.4
    vote_thresholds:
      bullish_consensus_margin: 3
      bearish_consensus_margin: 2
    confidence_weights:
      signal: 0.4
      agreement: 0.6
    conflict_penalty:
      per_conflict: 0.1
      max: 0.3
  price_prediction:
    atr_multiplier: 1.5
    boll_multiplier: 1.0

# 报告配置
report:
  default_format: html
  include_charts: true
  chart_height: 600

# 输出配置
output:
  directory: output/reports
  filename_pattern: "{stock_code}_{date}"

# 特征正交化配置
feature_engineering:
  enabled: true
  variance_threshold: 0.95
  correlation_threshold: 0.7
  method: "pca"

# 动态权重配置
dynamic_weights:
  enabled: true
  smoothing_alpha: 0.3
  regimes:
    趋势牛市:
      technical: 0.6
      fund_flow: 0.2
      sentiment: 0.2
    极端恐慌:
      technical: 0.2
      fund_flow: 0.2
      sentiment: 0.6
    机构行情:
      technical: 0.3
      fund_flow: 0.5
      sentiment: 0.2
    缩量震荡:
      technical: 0.4
      fund_flow: 0.3
      sentiment: 0.3

# HMM市场状态识别配置
hmm:
  enabled: true
  n_components: 4
  model_path: "models/hmm_regime.pkl"
  training_index: "000300"

# LightGBM混合预测模型配置
ml_model:
  enabled: true
  model_dir: "models/"
  alpha: 0.5
  hyperparams:
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 200
    min_child_samples: 20
  min_training_days: 60

# 蒙特卡洛压力测试配置
stress_test:
  enabled: true
  n_simulations: 200
  noise_scale: 0.5

# 数据预处理配置
preprocessing:
  robust_z_threshold: 3.0
  outlier_method: "winsorize"
  mad_fallback: "iqr"
  enabled: true
  denoise:
    method: "kalman"
    kalman_Q: 1e-5
    kalman_R: 1e-2
    ema_alpha_range: [0.05, 0.3]

# 数据验证配置
data_validation:
  price_diff_threshold: 0.01
  volume_diff_threshold: 0.20
  circuit_breaker_timeout: 300
  health_check_interval: 60
  enabled: true

# 波动率配置
volatility:
  hv_windows: [20, 60]
  parkinson_window: 20
  garman_klass_window: 20
  realized_vol_window: 20
  low_vol_percentile: 25
  high_vol_percentile: 75

# Celery异步任务配置
celery:
  broker_url: "${CELERY_BROKER_URL:redis://localhost:6379/0}"
  result_backend: "${CELERY_RESULT_BACKEND:redis://localhost:6379/1}"
  worker_concurrency: 4
  task_timeout: 300
  enabled: false
